spring:
  application:
    name: main-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: false
        service-id: config-server

eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: cloud
  cloud:
    config:
      discovery:
        enabled: true

eureka:
  client:
    enabled: true

server:
  port: 0

