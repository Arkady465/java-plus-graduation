spring:
  application:
    name: main-service
  profiles:
    default: cloud
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    config:
      discovery:
        enabled: false

eureka:
  client:
    enabled: false

server:
  port: 8080

