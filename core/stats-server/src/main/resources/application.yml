spring:
  application:
    name: stats-server
  profiles:
    default: cloud
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    ip-address: ${HOST_IP:}
    hostname: ${HOSTNAME:localhost}

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    config:
      discovery:
        enabled: false

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    ip-address: ${HOST_IP:}
    hostname: ${HOSTNAME:localhost}

server:
  port: 9090

