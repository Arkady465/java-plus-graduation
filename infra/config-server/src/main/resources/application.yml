spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations: "file:${user.dir}/config,file:./config,file:../config,file:${user.dir}/../../config"

# Фиксированный порт по умолчанию — упрощает проверку в CI
server:
  port: 8888

# Явно включаем eureka client по умолчанию, чтобы service регистрировался в Eureka
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    ip-address: ${HOST_IP:}
    hostname: ${HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Добавим debug логирование для клиента Eureka — это поможет понять проблему регистрации
logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

# Для локального/CI запуска — фиксированный порт и регистрация в Eureka включена
server:
  port: 8888

eureka:
  client:
    enabled: true
