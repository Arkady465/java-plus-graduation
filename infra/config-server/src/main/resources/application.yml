spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations: "file:${user.dir}/config,file:./config,file:../config,file:${user.dir}/../../config"

server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    ip-address: ${HOST_IP:}
    hostname: ${HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info
