version: '3.8'
services:
  postgres:
    image: postgres:16.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ewm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: ./infra/discovery-server
    environment:
      - EUREKA_INSTANCE_IP_ADDRESS=127.0.0.1
    ports:
      - "8761:8761"

  config-server:
    build:
      context: ./infra/config-server
    environment:
      - EUREKA_INSTANCE_IP_ADDRESS=127.0.0.1
    ports:
      - "8888:8888"

  stats-server:
    build:
      context: ./core/stats-server
    environment:
      - HOST_IP=127.0.0.1
    ports:
      - "9090:9090"

  main-service:
    build:
      context: ./core/main-service
    environment:
      - HOST_IP=127.0.0.1
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ewm
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    ports:
      - "8081:8081"

  gateway-server:
    build:
      context: ./infra/gateway-server
    environment:
      - HOST_IP=127.0.0.1
    ports:
      - "8080:8080"

networks:
  default:
    name: ewm_ci_net
